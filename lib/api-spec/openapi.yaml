openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: W3AppDevelopers API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
  - name: blogs
    description: Blog management
  - name: admin
    description: Admin dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Contact submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact/submissions:
    get:
      operationId: listContactSubmissions
      tags: [contact]
      summary: List all contact submissions (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSubmission"

  /blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List published blogs
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of blogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createBlog
      tags: [blogs]
      summary: Create a new blog post (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "201":
          description: Blog created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBlog
      tags: [blogs]
      summary: Update a blog post (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogUpdate"
      responses:
        "200":
          description: Updated blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: deleteBlog
      tags: [blogs]
      summary: Delete a blog post (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /blogs/slug/{slug}:
    get:
      operationId: getBlogBySlug
      tags: [blogs]
      summary: Get a blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: ["string", "null"]
        subject:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    ContactSubmission:
      type: object
      required: [id, name, email, subject, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    Blog:
      type: object
      required: [id, title, slug, content, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: ["string", "null"]
        content:
          type: string
        featuredImage:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        status:
          type: string
          enum: [published, draft]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        author:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BlogInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        content:
          type: string
        featuredImage:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        status:
          type: string
          enum: [published, draft]
          default: draft
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        author:
          type: ["string", "null"]

    BlogUpdate:
      type: object
      properties:
        title:
          type: ["string", "null"]
        slug:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        featuredImage:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        author:
          type: ["string", "null"]

    AdminLoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AdminAuthToken:
      type: object
      required: [token, message]
      properties:
        token:
          type: string
        message:
          type: string

    AdminStats:
      type: object
      required: [totalContacts, totalBlogs, publishedBlogs, draftBlogs]
      properties:
        totalContacts:
          type: integer
        totalBlogs:
          type: integer
        publishedBlogs:
          type: integer
        draftBlogs:
          type: integer
