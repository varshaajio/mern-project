kind = "web"
previewPath = "/nextjs"
title = "W3AppDevelopers (Next.js)"
version = "1.0.0"
id = "artifacts/w3app-next"
router = "path"

[[services]]
name = "web"
paths = [ "/nextjs" ]
localPort = 3001

[services.development]
run = "cd /home/runner/workspace/artifacts/w3app-next && PORT_NEXT=3001 npx next dev -p 3001 --hostname 0.0.0.0"

[services.env]
PORT = "3001"
PORT_NEXT = "3001"
NODE_ENV = "development"
