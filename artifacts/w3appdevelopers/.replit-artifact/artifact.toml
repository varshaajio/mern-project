kind = "web"
previewPath = "/"
title = "W3AppDevelopers"
version = "1.0.0"
id = "artifacts/w3appdevelopers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19819

[services.development]
run = "pnpm --filter @workspace/w3appdevelopers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/w3appdevelopers", "run", "build" ]
publicDir = "artifacts/w3appdevelopers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19819"
BASE_PATH = "/"
